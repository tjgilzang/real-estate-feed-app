<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>부동산 피드 앱</title>
  <style>
    :root { --bg: #f4f6f8; --fg: #0f1720; --accent: #0b66ff; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); }
    main { max-width: 860px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { line-height: 1.55; margin: 8px 0; }
    .row { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    a.btn { text-decoration: none; background: var(--accent); color: #fff; padding: 10px 14px; border-radius: 10px; font-weight: 600; }
    img { margin-top: 18px; width: 100%; border-radius: 10px; border: 1px solid #dbe3ea; }
    .meta { margin-top: 14px; font-size: 13px; color: #516173; }
  </style>
</head>
<body>
  <main>
    <h1>부동산 피드 앱</h1>
    <p>자동 추천 필터와 카드형 피드 UI를 제공하는 MVP입니다.</p>
    <div class="row">
      <a class="btn" href="https://github.com/tjgilzang/real-estate-feed-app" target="_blank" rel="noreferrer">GitHub 저장소</a>
    </div>
    <img src="./screenshots/recommendation-feed.png" alt="부동산 피드 앱 화면 캡처">
    <p class="meta">배포 시각: 2026-03-10 KST</p>
  </main>
</body>
</html>
